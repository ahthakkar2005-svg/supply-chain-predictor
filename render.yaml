services:
  - type: web
    name: supply-chain-predictor-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
